services:
  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run server:start"
    ports:
      - '3001:3001'
    volumes:
      - ./:/app
      - /app/node_modules
      - localops-data:/app/data
    environment:
      - PORT=3001
      - NODE_ENV=development

  app:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4173"
    ports:
      - '4173:4173'
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_PROXY_TARGET=http://api:3001
      - PLAYWRIGHT_API_HEALTH_URL=http://api:3001/api/v1/health
    depends_on:
      - api

volumes:
  localops-data:
