services:
  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run server:start"
    ports:
      - '3001:3001'
    volumes:
      - ./:/app
      - /app/node_modules
      - localops-data:/app/data
    environment:
      - PORT=3001
      - NODE_ENV=production

  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4173"
    ports:
      - '4173:4173'
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api

volumes:
  localops-data:
